name: Deploy Programmatic Jekyll site to Pages

on:
  push:
    branches: ["main"] # Mude para 'master' se for o nome da sua branch principal
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js (Para gerar as páginas SEO)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependências Node
        run: npm install

      - name: Gerar páginas programáticas
        run: npm run generate

      - name: Setup Ruby (Para o Jekyll)
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true # Faz cache das gems para ficar mais rápido

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build com Jekyll
        run: bundle exec jekyll build --baseurl "${{ steps.pages.outputs.base_path }}"
        env:
          JEKYLL_ENV: production

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
