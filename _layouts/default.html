<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {{ site.title }}{% else %}{{ site.title }} - Crie seu Site Profissional{% endif %}</title>
    <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
    
    <!-- SEO & Canonical -->
    {% seo %}
    
    <!-- CSS -->
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
    
    <!-- Open Graph -->
    <meta property="og:title" content="{% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}">
    <meta property="og:description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
    <meta property="og:url" content="{{ page.url | absolute_url }}">
    <meta property="og:type" content="{% if page.layout == 'post' or page.layout == 'programmatic' %}article{% else %}website{% endif %}">
    
    <!-- Twitter Cards -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="{% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}">
    <meta name="twitter:description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">

    <!-- JSON-LD Breadcrumb Schema -->
    {% if page.breadcrumbs %}
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "BreadcrumbList",
      "itemListElement": [
        {
          "@type": "ListItem",
          "position": 1,
          "name": "Home",
          "item": "{{ '/' | absolute_url }}"
        }
        {% for crumb in page.breadcrumbs %}
        ,{
          "@type": "ListItem",
          "position": {{ forloop.index | plus: 1 }},
          "name": "{{ crumb.name }}",
          "item": "{{ crumb.url | absolute_url }}"
        }
        {% endfor %}
      ]
    }
    </script>
    {% endif %}

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header class="header">
            <a href="{{ '/' | relative_url }}" class="logo">Linkfl Blog</a>
            <nav>
                <a href="https://linkfl.com.br" class="btn" style="padding: 8px 16px; margin: 0; font-size: 14px;">Criar meu Site</a>
            </nav>
        </header>

        <main class="content">
            {{ content }}
        </main>

        <footer class="footer">
            <p>&copy; {{ site.time | date: '%Y' }} Linkfl. Todos os direitos reservados.</p>
            <p>Acelere seu negócio com a melhor plataforma de sites de alta conversão.</p>
        </footer>
    </div>
</body>
</html>
