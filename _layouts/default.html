<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <!-- Google Tag Manager -->
    <script>(function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':
    new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
    j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
    'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
    })(window,document,'script','dataLayer','GTM-5R87SC7B');</script>
    <!-- End Google Tag Manager -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="{{ '/assets/img/favicon.svg' | relative_url }}">
    
    {% seo %}

    {% if page.breadcrumbs %}
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "BreadcrumbList",
      "itemListElement": [
        { "@type": "ListItem", "position": 1, "name": "Home", "item": "{{ '/' | absolute_url }}" }
        {% for crumb in page.breadcrumbs %}
        ,{ "@type": "ListItem", "position": {{ forloop.index | plus: 1 }}, "name": "{{ crumb.name }}", "item": "{{ crumb.url | absolute_url }}" }
        {% endfor %}
      ]
    }
    </script>
    {% endif %}

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              display: ['Sora', 'sans-serif'],
              body: ['DM Sans', 'sans-serif'],
            },
            colors: {
              brand: {
                DEFAULT: '#0057FF',
                dark: '#003EC7',
                light: '#EEF3FF',
              }
            }
          }
        }
      }
    </script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">

    <style>
      body { font-family: 'DM Sans', sans-serif; }
      .font-display { font-family: 'Sora', sans-serif; }
      .prose h2 { font-family: 'Sora', sans-serif; font-size: 1.4rem; font-weight: 700; color: #0D0D0D; margin: 2.5rem 0 0.75rem; letter-spacing: -0.3px; }
      .prose h3 { font-family: 'Sora', sans-serif; font-size: 1.15rem; font-weight: 600; color: #0D0D0D; margin: 1.8rem 0 0.5rem; }
      .prose p { margin-bottom: 1.1rem; color: #3A3A3A; line-height: 1.8; }
      .prose a { color: #0057FF; text-decoration: underline; text-underline-offset: 3px; }
      .prose ul { padding-left: 1.5rem; margin-bottom: 1.2rem; list-style: disc; }
      .prose ol { padding-left: 1.5rem; margin-bottom: 1.2rem; list-style: decimal; }
      .prose li { margin-bottom: 0.5rem; color: #3A3A3A; }
      .prose strong { color: #0D0D0D; font-weight: 600; }
      .prose blockquote { border-left: 4px solid #0057FF; padding: 1rem 1.25rem; background: #EEF3FF; border-radius: 0 8px 8px 0; margin: 1.5rem 0; font-style: italic; }
      .prose img { max-width: 100%; border-radius: 12px; margin: 1.5rem 0; }
      .prose code { background: #F7F8FC; border: 1px solid #E4E7EF; padding: 2px 6px; border-radius: 4px; font-size: 0.875rem; }
      .prose pre { background: #0D0D0D; border-radius: 12px; padding: 1.25rem; overflow-x: auto; margin: 1.5rem 0; }
      .prose pre code { background: none; border: none; color: #e5e7eb; }
    </style>
</head>
<body class="bg-white text-gray-900 antialiased">
    <!-- Google Tag Manager (noscript) -->
    <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-5R87SC7B"
    height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
    <!-- End Google Tag Manager (noscript) -->

    <!-- HEADER -->
    <header class="sticky top-0 z-50 bg-white/85 backdrop-blur-lg border-b border-gray-100">
        <div class="max-w-5xl mx-auto px-6 h-16 flex items-center justify-between gap-4">
            <a href="{{ '/' | relative_url }}" class="flex-shrink-0">
                <img src="{{ '/assets/img/Logo-text-2048x512.svg' | relative_url }}" alt="Linkfl Blog" class="h-7 block">
            </a>
            <nav class="flex items-center gap-2">
                <a href="{{ '/' | relative_url }}" class="font-display text-sm font-medium text-gray-600 px-3 py-1.5 rounded-lg hover:bg-blue-50 hover:text-blue-600 transition-colors">Blog</a>
                <a href="https://linkfl.com.br" class="font-display inline-flex items-center gap-1.5 bg-blue-600 text-white text-sm font-semibold px-4 py-2 rounded-lg shadow-md hover:bg-blue-700 hover:-translate-y-px transition-all">
                    <svg width="13" height="13" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg>
                    Criar meu Site
                </a>
            </nav>
        </div>
    </header>

    <!-- MAIN -->
    <main class="min-h-screen">
        {{ content }}
    </main>

    <!-- FOOTER -->
    <footer class="mt-20 border-t border-gray-100 bg-gray-50">
        <div class="max-w-5xl mx-auto px-6 py-12 grid grid-cols-1 md:grid-cols-2 gap-10 items-center">
            <div class="flex flex-col gap-3">
                <img src="{{ '/assets/img/Logo-text-2048x512.svg' | relative_url }}" alt="Linkfl" class="h-6 w-auto">
                <p class="text-sm text-gray-500 max-w-xs leading-relaxed">A plataforma de sites profissionais focada em conversão e SEO para negócios brasileiros.</p>
            </div>
            <div class="flex flex-col items-start md:items-end gap-2">
                <a href="https://linkfl.com.br" class="text-sm text-gray-500 hover:text-blue-600 transition-colors">Criar meu Site</a>
                <a href="{{ '/' | relative_url }}" class="text-sm text-gray-500 hover:text-blue-600 transition-colors">Blog</a>
                <a href="https://linkfl.com.br/contato" class="text-sm text-gray-500 hover:text-blue-600 transition-colors">Contato</a>
            </div>
        </div>
        <div class="border-t border-gray-100 py-4 text-center">
            <p class="text-xs text-gray-400">&copy; {{ site.time | date: '%Y' }} Linkfl. Todos os direitos reservados.</p>
        </div>
    </footer>

</body>
</html>
